name: Build and Push Docker Image (latest)

on:
  push:
    branches:
      - main
    # Ne pas déclencher sur les commits automatiques de semantic-release ([skip ci])
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/idrinkx/plex-portal:latest
