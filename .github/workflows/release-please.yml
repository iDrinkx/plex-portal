name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version:   ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Checkout with credentials for README update
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README version badge
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          # Get version from semantic-release output or package.json
          VERSION=${VERSION:-$(node -p "require('./package.json').version")}
          echo "📦 Updating README badge to v$VERSION"

          # Ensure we're on the latest main
          git fetch origin main
          git checkout origin/main -- README.md || git checkout main -- README.md

          # Update README
          sed -i "s/Version-[0-9]\+\.[0-9]\+\.[0-9]\+/Version-$VERSION/" README.md

          # Check if file actually changed
          if ! git diff --quiet README.md; then
            echo "✓ README needs update"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md

            # Try to commit and push
            if git commit -m "chore(release): update README version badge to v$VERSION [skip ci]"; then
              if git push origin main; then
                echo "✓ README pushed successfully"
              else
                echo "⚠️  Push failed, retrying..."
                git push -u origin main || echo "❌ Failed to push"
              fi
            else
              echo "⚠️  No changes to commit"
            fi
          else
            echo "✓ README already up to date"
          fi

  # Quand une release est publiée → rebuild Docker avec le tag de version
  docker-release:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (versioned + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/idrinkx/plex-portal:latest
            ghcr.io/idrinkx/plex-portal:v${{ needs.release.outputs.new_release_version }}
